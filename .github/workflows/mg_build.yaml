name: Build and push Docker image

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        
      - name: Get version
        id: version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/AykutSarac/jsoncrack.com/releases/latest | jq -r .tag_name)
          if [ "$VERSION" = "null" ] || [ -z "$VERSION" ]; then
            VERSION=$(curl -s https://api.github.com/repos/AykutSarac/jsoncrack.com/commits/main | jq -r '.sha[:7]')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Patch Dockerfile
        run: |
          sed -i 's|COPY ./nginx.conf|COPY ./apps/www/nginx.conf|g' apps/www/Dockerfile
          sed -i 's/pnpm run build/pnpm install --no-frozen-lockfile -r \&\& pnpm build:www/g' apps/www/Dockerfile
          sed -i 's/--frozen-lockfile/--no-frozen-lockfile/g' apps/www/Dockerfile
          sed -i 's|COPY --from=builder /app/out|COPY --from=builder /app/apps/www/out|g' apps/www/Dockerfile

      - name: Patch nginx.conf
        run: |
          sed -i 's|location /docs {|location /converter {\n        try_files $uri $uri.html;\n    }\n\n    location /docs {|' apps/www/nginx.conf
          
      - name: Build and push amd64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/www/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            gorkinus/jsoncrack:latest-amd64
            gorkinus/jsoncrack:${{ steps.version.outputs.version }}-amd64

  build-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/AykutSarac/jsoncrack.com/releases/latest | jq -r .tag_name)
          if [ "$VERSION" = "null" ] || [ -z "$VERSION" ]; then
            VERSION=$(curl -s https://api.github.com/repos/AykutSarac/jsoncrack.com/commits/main | jq -r '.sha[:7]')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Patch Dockerfile
        run: |
          sed -i 's|COPY ./nginx.conf|COPY ./apps/www/nginx.conf|g' apps/www/Dockerfile
          sed -i 's/pnpm run build/pnpm install --no-frozen-lockfile -r \&\& pnpm build:www/g' apps/www/Dockerfile
          sed -i 's/--frozen-lockfile/--no-frozen-lockfile/g' apps/www/Dockerfile
          sed -i 's|COPY --from=builder /app/out|COPY --from=builder /app/apps/www/out|g' apps/www/Dockerfile

      - name: Patch nginx.conf
        run: |
          sed -i 's|location /docs {|location /converter {\n        try_files $uri $uri.html;\n    }\n\n    location /docs {|' apps/www/nginx.conf

      - name: Build and push arm64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/www/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            gorkinus/jsoncrack:latest-arm64
            gorkinus/jsoncrack:${{ steps.version.outputs.version }}-arm64

  merge:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          # берём версию из тега arm64 который уже запушен
          echo "version=$(docker buildx imagetools inspect gorkinus/jsoncrack:latest-arm64 --format '{{json .}}' | jq -r '.manifest.annotations["org.opencontainers.image.version"] // "latest"')" >> $GITHUB_OUTPUT

      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            -t gorkinus/jsoncrack:latest \
            gorkinus/jsoncrack:latest-amd64 \
            gorkinus/jsoncrack:latest-arm64
